<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Jurisdiction Dashboard preview</title>
  <desc id="desc">BioMed Jurisdiction Dashboard: white Red Cross app bar, FY25 KPI band, national jurisdiction map, and fixed site list.</desc>
  <defs>
    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f4ee"/>
      <stop offset=".55" stop-color="#ece6d5"/>
      <stop offset="1" stop-color="#e2e8e2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f1720" flood-opacity=".14"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#e7ecf0"/>

  <g font-family="'Source Sans Pro', Arial, Helvetica, sans-serif">
    <!-- White Red Cross app bar (RcAppBar) -->
    <rect x="0" y="0" width="1600" height="92" fill="#ffffff"/>
    <rect x="0" y="91" width="1600" height="1.5" fill="#d8dde3"/>

    <!-- Home -->
    <rect x="22" y="26" width="58" height="40" rx="9" fill="#fff" stroke="#d5dbe2"/>
    <path d="M40 50l11-9 11 9M43 48v12h16V48" fill="none" stroke="#15171c" stroke-width="2.4" stroke-linejoin="round"/>
    <!-- Red Cross mark -->
    <g transform="translate(104 30)">
      <circle cx="17" cy="17" r="17" fill="#fff" stroke="#e6e9ee"/>
      <rect x="13" y="6" width="8" height="22" fill="#ED1B2E"/>
      <rect x="6" y="13" width="22" height="8" fill="#ED1B2E"/>
    </g>
    <text x="150" y="44" font-size="30" font-weight="800" fill="#1a1a1a" font-family="'Libre Baskerville', Georgia, serif">Jurisdiction Dashboard</text>
    <text x="152" y="68" font-size="15" fill="#737373">American Red Cross</text>

    <!-- Right controls -->
    <text x="900" y="40" font-size="11" font-weight="800" letter-spacing="1.4" fill="#67717d" font-family="'IBM Plex Mono', monospace">QUICK VIEW</text>
    <rect x="900" y="48" width="250" height="34" rx="6" fill="#fff" stroke="#d5dbe2"/>
    <text x="916" y="70" font-size="15" font-weight="700" fill="#15171c">Minimal — boundaries + sites</text>
    <path d="M1130 62l8 8 8-8" fill="none" stroke="#67717d" stroke-width="2"/>
    <rect x="1166" y="48" width="118" height="34" rx="8" fill="#fff" stroke="#d5dbe2"/>
    <text x="1196" y="70" font-size="15" font-weight="800" fill="#15171c">Reset</text>
    <circle cx="1312" cy="65" r="17" fill="#fff" stroke="#d5dbe2"/>
    <text x="1312" y="71" text-anchor="middle" font-size="18" font-weight="800" fill="#4f5b68">?</text>
    <rect x="1450" y="48" width="110" height="34" rx="8" fill="#ED1B2E"/>
    <text x="1505" y="70" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Sign in</text>

    <!-- KPI band -->
    <g>
      <rect x="22" y="108" width="300" height="66" rx="9" fill="#fff" stroke="#e4e8ed"/>
      <rect x="334" y="108" width="300" height="66" rx="9" fill="#fff" stroke="#e4e8ed"/>
      <rect x="646" y="108" width="300" height="66" rx="9" fill="#fff" stroke="#e4e8ed"/>
      <rect x="958" y="108" width="300" height="66" rx="9" fill="#fff" stroke="#e4e8ed"/>
      <rect x="1270" y="108" width="308" height="66" rx="9" fill="#fff" stroke="#f0c9cd"/>
    </g>
    <g text-anchor="middle" font-family="'IBM Plex Mono', monospace">
      <text x="172" y="132" font-size="13" font-weight="700" letter-spacing=".4" fill="#67717d" font-family="'Source Sans Pro', Arial, sans-serif">FY25 RED CELL DRIVES</text>
      <text x="172" y="162" font-size="28" font-weight="800" fill="#15171c">196,710</text>
      <text x="484" y="132" font-size="13" font-weight="700" fill="#67717d" font-family="'Source Sans Pro', Arial, sans-serif">FY25 RED CELL COLLECTIONS</text>
      <text x="484" y="162" font-size="28" font-weight="800" fill="#15171c">4,630,754</text>
      <text x="796" y="132" font-size="13" font-weight="700" fill="#67717d" font-family="'Source Sans Pro', Arial, sans-serif">FY25 SDP UNITS</text>
      <text x="796" y="162" font-size="28" font-weight="800" fill="#15171c">1,163,128</text>
      <text x="1108" y="132" font-size="13" font-weight="700" fill="#67717d" font-family="'Source Sans Pro', Arial, sans-serif">FY25 PLASMA UNITS</text>
      <text x="1108" y="162" font-size="28" font-weight="800" fill="#15171c">54,102</text>
      <text x="1424" y="132" font-size="13" font-weight="700" fill="#b1262f" font-family="'Source Sans Pro', Arial, sans-serif">FIXED SITES</text>
      <text x="1424" y="162" font-size="28" font-weight="900" fill="#ED1B2E">1,284</text>
    </g>

    <!-- Map stage -->
    <rect x="22" y="192" width="1252" height="688" rx="10" fill="#eef2f5"/>
    <path d="M48 351 C150 305 256 292 392 310 C504 326 588 297 694 333 C814 374 892 350 1018 308 C1116 275 1212 302 1262 276 L1262 868 L48 868 L48 423 Z" fill="url(#land)"/>

    <g opacity=".7" fill="none" stroke="#8a795e" stroke-width="1">
      <path d="M96 258H1236M80 330H1230M58 418H1262M80 506H1232M58 604H1262M96 700H1244"/>
      <path d="M168 218V858M256 218V858M344 218V858M466 218V858M588 218V858M720 218V858M852 218V858M988 218V858M1130 218V858"/>
    </g>

    <!-- Jurisdiction polygons (muted, points sit on top) -->
    <g opacity=".62" stroke="#5b5b5b" stroke-width="1.4">
      <path d="M72 368 L256 314 L346 400 L292 568 L88 596 Z" fill="#9fd3da"/>
      <path d="M292 304 L486 266 L572 380 L508 540 L308 534 Z" fill="#dcdda6"/>
      <path d="M510 306 L712 268 L820 384 L752 548 L556 544 Z" fill="#ecd29b"/>
      <path d="M760 326 L934 290 L1058 412 L1006 582 L800 572 Z" fill="#dcafb7"/>
      <path d="M1006 388 L1196 354 L1264 502 L1162 688 L988 622 Z" fill="#f2dd95"/>
      <path d="M400 532 L610 492 L700 636 L610 800 L416 768 Z" fill="#9fd0e4"/>
      <path d="M652 526 L848 496 L934 644 L844 802 L660 770 Z" fill="#cbb6e0"/>
      <path d="M886 552 L1100 534 L1184 694 L1066 838 L894 794 Z" fill="#e4b394"/>
    </g>

    <g font-size="15" fill="#53606a" font-family="'Source Sans Pro', Arial, sans-serif">
      <text x="582" y="588" font-size="32" font-weight="800" fill="#d4d0c4">UNITED</text>
      <text x="585" y="622" font-size="32" font-weight="800" fill="#d4d0c4">STATES</text>
      <text x="1050" y="368">Toronto</text>
      <text x="1098" y="516">New York</text>
      <text x="1036" y="566">Philadelphia</text>
      <text x="992" y="630">Washington</text>
      <text x="770" y="530">St. Louis</text>
      <text x="736" y="480">Chicago</text>
      <text x="500" y="726">Dallas</text>
      <text x="240" y="744">Phoenix</text>
      <text x="104" y="740">Los Angeles</text>
    </g>

    <!-- Site icons on top -->
    <g stroke="#1b1b1b" stroke-width="1">
      <circle cx="170" cy="756" r="6" fill="#e1262f"/>
      <circle cx="234" cy="710" r="6" fill="#e1262f"/>
      <circle cx="318" cy="630" r="6" fill="#ffd926"/>
      <circle cx="448" cy="604" r="6" fill="#ffd926"/>
      <circle cx="536" cy="642" r="6" fill="#e1262f"/>
      <circle cx="654" cy="618" r="6" fill="#ffd926"/>
      <circle cx="748" cy="562" r="6" fill="#e1262f"/>
      <circle cx="818" cy="512" r="6" fill="#ffd926"/>
      <circle cx="896" cy="552" r="6" fill="#e1262f"/>
      <circle cx="968" cy="616" r="6" fill="#ffd926"/>
      <circle cx="1060" cy="584" r="6" fill="#e1262f"/>
      <circle cx="1128" cy="524" r="6" fill="#ffd926"/>
      <circle cx="1178" cy="472" r="6" fill="#e1262f"/>
      <path d="M748 498 h10 v-10 h8 v10 h10 v8 h-10 v10 h-8 v-10 h-10z" fill="#1aa557"/>
      <path d="M1012 538 h10 v-10 h8 v10 h10 v8 h-10 v10 h-8 v-10 h-10z" fill="#1aa557"/>
      <path d="M208 779 h10 v-10 h8 v10 h10 v8 h-10 v10 h-8 v-10 h-10z" fill="#1aa557"/>
    </g>

    <!-- Fixed site list -->
    <rect x="1288" y="192" width="290" height="688" rx="10" fill="#fff" stroke="#e4e8ed"/>
    <text x="1433" y="226" text-anchor="middle" font-size="16" font-weight="800" fill="#b1262f">Fixed Site List</text>
    <text x="1433" y="248" text-anchor="middle" font-size="13" fill="#737373">Click a site to locate it on the map</text>
    <rect x="1306" y="266" width="254" height="36" rx="7" fill="#fff" stroke="#d5dbe2"/>
    <text x="1330" y="290" font-size="14" fill="#9aa1a8">Search sites…</text>
    <g font-size="15" fill="#15171c">
      <rect x="1306" y="316" width="254" height="58" rx="8" fill="#f8fafb" stroke="#e6eaef"/>
      <text x="1324" y="340" font-weight="800">Brighton American Red Cross</text>
      <text x="1324" y="361" fill="#737373" font-size="13">Brighton, CO</text>
      <rect x="1306" y="380" width="254" height="58" rx="8" fill="#fff" stroke="#e6eaef"/>
      <text x="1324" y="404" font-weight="800">Overland Park American</text>
      <text x="1324" y="425" fill="#737373" font-size="13">Overland Park, KS</text>
      <rect x="1306" y="444" width="254" height="58" rx="8" fill="#f8fafb" stroke="#e6eaef"/>
      <text x="1324" y="468" font-weight="800">Seattle American Red Cross</text>
      <text x="1324" y="489" fill="#737373" font-size="13">Seattle, WA</text>
      <rect x="1306" y="508" width="254" height="58" rx="8" fill="#fff" stroke="#e6eaef"/>
      <text x="1324" y="532" font-weight="800">Lanham American Red Cross</text>
      <text x="1324" y="553" fill="#737373" font-size="13">Lanham, MD</text>
      <rect x="1306" y="572" width="254" height="58" rx="8" fill="#f8fafb" stroke="#e6eaef"/>
      <text x="1324" y="596" font-weight="800">Blaine American Red Cross</text>
      <text x="1324" y="617" fill="#737373" font-size="13">Blaine, MN</text>
      <rect x="1306" y="636" width="254" height="58" rx="8" fill="#fff" stroke="#e6eaef"/>
      <text x="1324" y="660" font-weight="800">Delran American Red Cross</text>
      <text x="1324" y="681" fill="#737373" font-size="13">Delran, NJ</text>
      <rect x="1306" y="700" width="254" height="58" rx="8" fill="#f8fafb" stroke="#e6eaef"/>
      <text x="1324" y="724" font-weight="800">Newark American Red Cross</text>
      <text x="1324" y="745" fill="#737373" font-size="13">Newark, DE</text>
    </g>

    <!-- map zoom + scale -->
    <rect x="1232" y="792" width="32" height="68" rx="7" fill="#fff" filter="url(#soft)"/>
    <text x="1248" y="820" text-anchor="middle" font-size="22" fill="#555">+</text>
    <text x="1248" y="852" text-anchor="middle" font-size="24" fill="#555">−</text>
    <rect x="44" y="844" width="74" height="20" fill="#fff" opacity=".85"/>
    <text x="52" y="859" font-size="14" fill="#15171c">200 mi</text>
  </g>
</svg>
