<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ARC jurisdiction dashboard preview</title>
  <desc id="desc">Post sign-in BioMed dashboard preview with red filters, KPI cards, a national jurisdiction map, and fixed site list.</desc>
  <defs>
